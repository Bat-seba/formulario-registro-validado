<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción Cursos Online</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="form-container">
        <form id="registro-form" novalidate>    <!-- Uso de novalidate para evitar el envío automático de errores de validación y que pueda ser gestionado con JavaScript. -->
            <h2>FORMULARIO DE REGISTRO</h2>
            
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required placeholder="Ej: Rosa">
            <span id="error-nombre" class="error-msg"></span>

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required placeholder="usuario@dominio.com">
            <span id="error-email" class="error-msg"></span>

            <label for="telefono">Teléfono:</label>
            <input type="text" id="telefono" name="telefono" required placeholder="+34 600 123 456">
            <span id="error-telefono" class="error-msg"></span>

           <label for="password">Contraseña:</label>
        <div class="password-group">
            <input type="password" id="password" name="password" required>
            <button type="button" id="togglePassword">Ver</button>
        </div>
        <span id="error-password" class="error-msg"></span>

        <button type="submit" id="btn-enviar">Registrarme</button>
        </form>

        <p id="mensaje-servidor"></p>
    </div>

    <template id="plantilla-bienvenida">
    <div class="welcome-card">
        <h1></h1> <p>¡Te has registrado correctamente! Ahora ya puedes disfrutar de los cursos que ofrecemos.</p>
        
        <div class="courses-selection">
            <h3>Elige tu curso:</h3>
            <form id="form-cursos">
                <div class="curso-option">
                    <input type="checkbox" id="curso4" name="curso" value="react">
                    <label for="curso4">Frameworks de Frontend (React/Angular)</label>
                </div>

                <div class="curso-option">
                    <input type="checkbox" id="curso5" name="curso" value="bbdd">
                    <label for="curso5">Gestión de Bases de Datos NoSQL</label>
                </div>

                <div class="curso-option">
                    <input type="checkbox" id="curso6" name="curso" value="deploy">
                    <label for="curso6">Despliegue de Aplicaciones Web</label>
                </div>

                <div class="curso-option">
                    <input type="checkbox" id="curso7" name="curso" value="ux">
                    <label for="curso7">Experiencia de Usuario y Accesibilidad</label>
                </div>
                
                <div class="curso-option">
                    <input type="checkbox" id="curso8" name="curso" value="security">
                    <label for="curso8">Seguridad en Aplicaciones Web</label>
                </div>
                
                <button type="button" class="btn-confirmar" onclick="alert('✅ ¡Estupendo! En breve recibirás un correo con la información de los cursos seleccionados.')">
                    Confirmar cursos
                </button>
            </form>
        </div>
    </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
